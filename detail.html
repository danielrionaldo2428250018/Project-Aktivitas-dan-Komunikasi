<!DOCTYPE html>
<html>
<head>
<title>Movie Detail</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0b0d;
color:white;
}

/* BANNER */
.banner{
background-size:cover;
background-position:center;
}

.overlay{
background:linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.3));
padding:40px;
display:flex;
gap:30px;
align-items:flex-start;
}

.poster{
width:200px;
border-radius:10px;
}

/* BUTTON */
button{
padding:6px 10px;
margin-top:5px;
cursor:pointer;
border:none;
border-radius:6px;
background:#f5c518;
}

.favorite{
background:#222;
color:white;
}

.favorite.active{
background:red;
}

/* SECTION */
.section{
padding:20px;
}

/* CAST */
.cast{
display:flex;
gap:10px;
overflow-x:auto;
}

.cast div{
text-align:center;
cursor:pointer;
}

.cast img{
width:80px;
border-radius:10px;
}

/* TRAILER */
iframe{
width:100%;
height:400px;
border:none;
}

/* COMMENT */
.comment{
background:#16161a;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.reply{
margin-left:20px;
margin-top:5px;
}

/* RATING MODAL */
.rating-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.rating-box{
background:#16161a;
padding:30px;
border-radius:10px;
width:400px;
text-align:center;
}

#moods span{
font-size:30px;
cursor:pointer;
margin:5px;
}

#moods span.selected{
border:2px solid #f5c518;
border-radius:50%;
}

.close{
float:right;
cursor:pointer;
}

</style>

</head>

<body>

<div id="banner" class="banner"></div>

<div class="section">
<button onclick="openRating()">⭐ Rate Movie</button>
<button id="favBtn" class="favorite" onclick="toggleFavorite()">❤️ Favorite</button>
</div>

<div class="section">
<h2>Trailer</h2>
<div id="trailer"></div>
</div>

<div class="section">
<h2>Cast</h2>
<div id="cast" class="cast"></div>
</div>

<div class="section">
<h2>Reviews</h2>
<div id="reviews"></div>
</div>

<div class="section">
<h2>Your Review</h2>

<input id="reviewInput" placeholder="Write review...">

<select id="ratingInput">
<option value="1">⭐</option>
<option value="2">⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="5">⭐⭐⭐⭐⭐</option>
</select>

<br><br>

<button onclick="addReview()">Submit</button>

<div id="userReviews"></div>
</div>

<!-- RATING MODAL -->
<div id="ratingModal" class="rating-modal">

<div class="rating-box">

<span class="close" onclick="closeRating()">✖</span>

<h2>Rating</h2>

<input type="range" id="ratingSlider" min="1" max="10">
<p id="ratingValue">5</p>

<h3>Mood</h3>

<div id="moods">
<span onclick="selectMood(this)">😄</span>
<span onclick="selectMood(this)">😍</span>
<span onclick="selectMood(this)">😐</span>
<span onclick="selectMood(this)">😢</span>
<span onclick="selectMood(this)">😡</span>
</div>

<br>

<button onclick="submitRating()">Save</button>

</div>

</div>

<script>

const API="66e5a263a9a88234aa2e06e5fca6ffb0"
const IMG="https://image.tmdb.org/t/p/w500"

const id=new URLSearchParams(location.search).get("id")

let selectedMood=""

/* INIT */
loadMovie()
loadCast()
loadReviews()
loadTrailer()
loadUserReviews()
checkFavorite()

function getUser(){
return JSON.parse(localStorage.getItem("currentUser"))
}

/* MOVIE */
async function loadMovie(){
const res=await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API}`)
const m=await res.json()

banner.style.backgroundImage=`url(https://image.tmdb.org/t/p/original${m.backdrop_path})`

banner.innerHTML=`
<div class="overlay">
<img class="poster" src="${IMG+m.poster_path}">
<div>
<h1>${m.title}</h1>
<p>${m.release_date}</p>
<p>${m.overview}</p>
</div>
</div>`
}

/* CAST */
async function loadCast(){
const res=await fetch(`https://api.themoviedb.org/3/movie/${id}/credits?api_key=${API}`)
const data=await res.json()

cast.innerHTML=data.cast.slice(0,10).map(c=>`
<div onclick="openActor(${c.id})">
<img src="${c.profile_path?IMG+c.profile_path:'https://via.placeholder.com/80'}">
<p>${c.name}</p>
</div>`).join("")
}

function openActor(id){
location.href="actor.html?id="+id
}

/* TRAILER */
async function loadTrailer(){
const res=await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API}`)
const data=await res.json()

if(data.results.length){
trailer.innerHTML=`<iframe src="https://www.youtube.com/embed/${data.results[0].key}"></iframe>`
}
}

/* API REVIEWS */
async function loadReviews(){
const res=await fetch(`https://api.themoviedb.org/3/movie/${id}/reviews?api_key=${API}`)
const data=await res.json()

reviews.innerHTML=data.results.slice(0,3).map(r=>`
<div class="comment"><b>${r.author}</b><br>${r.content.substring(0,120)}...</div>
`).join("")
}

/* USER REVIEWS */
function loadUserReviews(){

const key="review_"+id
const list=JSON.parse(localStorage.getItem(key))||[]

userReviews.innerHTML=""

list.forEach((r,index)=>{

const div=document.createElement("div")
div.className="comment"

div.innerHTML=`
<b>${r.user}</b> ⭐${r.rating}<br>
${r.text}<br>
<small>${r.time}</small><br>

<button onclick="likeReview(${index})">👍 ${r.likes||0}</button>

${getUser()?.username===r.user ? 
`<button onclick="deleteReview(${index})">🗑️</button>`:""}

<button onclick="toggleReply(${index})">Reply</button>

<div id="replyBox${index}" style="display:none;">
<input id="replyInput${index}" placeholder="Reply...">
<button onclick="addReply(${index})">Send</button>
</div>

${(r.replies||[]).map(rep=>`
<div class="comment reply">
<b>${rep.user}</b><br>
${rep.text}
</div>`).join("")}
`

userReviews.appendChild(div)

})
}

/* ADD REVIEW */
function addReview(){

const text=reviewInput.value.trim()
const rating=ratingInput.value
const user=getUser()

if(!text){
alert("Isi komentar dulu!")
return
}

const review={
text:text,
rating:rating,
user:user?.username||"Guest",
time:new Date().toLocaleString(),
likes:0,
replies:[]
}

const key="review_"+id
let list=JSON.parse(localStorage.getItem(key))||[]

list.unshift(review)

localStorage.setItem(key,JSON.stringify(list))

reviewInput.value=""

loadUserReviews()
}

/* DELETE */
function deleteReview(index){

const key="review_"+id
let list=JSON.parse(localStorage.getItem(key))||[]

list.splice(index,1)

localStorage.setItem(key,JSON.stringify(list))

loadUserReviews()
}

/* LIKE */
function likeReview(index){

const key="review_"+id
let list=JSON.parse(localStorage.getItem(key))||[]

list[index].likes=(list[index].likes||0)+1

localStorage.setItem(key,JSON.stringify(list))

loadUserReviews()
}

/* REPLY */
function toggleReply(index){
const box=document.getElementById("replyBox"+index)
box.style.display=box.style.display==="none"?"block":"none"
}

function addReply(index){

const text=document.getElementById("replyInput"+index).value.trim()
const user=getUser()

if(!text) return

const key="review_"+id
let list=JSON.parse(localStorage.getItem(key))||[]

list[index].replies.push({
user:user?.username||"Guest",
text:text
})

localStorage.setItem(key,JSON.stringify(list))

loadUserReviews()
}

/* FAVORITE */
function getFavorites(){
return JSON.parse(localStorage.getItem("favorites"))||[]
}

function checkFavorite(){
const fav=getFavorites()
if(fav.includes(id)){
favBtn.classList.add("active")
}
}

function toggleFavorite(){
let fav=getFavorites()

if(fav.includes(id)){
fav=fav.filter(f=>f!=id)
}else{
fav.push(id)
}

localStorage.setItem("favorites",JSON.stringify(fav))
checkFavorite()
}

/* RATING */
function openRating(){
ratingModal.style.display="flex"
}

function closeRating(){
ratingModal.style.display="none"
}

ratingSlider.oninput=function(){
ratingValue.innerText=this.value
}

function selectMood(el){
document.querySelectorAll("#moods span").forEach(s=>s.classList.remove("selected"))
el.classList.add("selected")
selectedMood=el.innerText
}

function submitRating(){

localStorage.setItem("rating_"+id,JSON.stringify({
rating:ratingSlider.value,
mood:selectedMood
}))

closeRating()
alert("Rating saved!")
}

</script>

</body>
</html>
